name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

jobs:
  lint-and-test:
    name: Lint + Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: cd apps/api && npm run test

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: lint-and-test

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ww_user
          POSTGRES_PASSWORD: ww_password
          POSTGRES_DB: ww_defender
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run migrations
        run: cd apps/api && npm run migration:run
        env:
          PORT: 3001
          NODE_ENV: test
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: ww_user
          DB_PASSWORD: ww_password
          DB_NAME: ww_defender
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          JWT_SECRET: ci-test-secret
          JWT_EXPIRES_IN: 24h

      - name: E2E tests
        run: cd apps/api && npm run test:e2e
        env:
          PORT: 3001
          NODE_ENV: test
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: ww_user
          DB_PASSWORD: ww_password
          DB_NAME: ww_defender
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          JWT_SECRET: ci-test-secret
          JWT_EXPIRES_IN: 24h
